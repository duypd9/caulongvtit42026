<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banner Giải Cầu Lông Viettel Software - Đôi Nam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --viettel-red: #ee0000;
            --viettel-dark: #b30000;
            --accent-yellow: #ffcc00;
        }
        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: #f1f5f9; 
            background-image: 
                radial-gradient(at 0% 0%, rgba(238, 0, 0, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(0, 0, 0, 0.05) 0px, transparent 50%);
            min-height: 100vh;
        }
        .oswald { font-family: 'Oswald', sans-serif; }
        
        .dynamic-bg {
            background: linear-gradient(135deg, var(--viettel-red) 0%, var(--viettel-dark) 100%);
            position: relative;
            overflow: hidden;
        }
        .dynamic-bg::before {
            content: "";
            position: absolute;
            top: -50%;
            left: -10%;
            width: 120%;
            height: 200%;
            background: repeating-linear-gradient(45deg, transparent, transparent 100px, rgba(255,255,255,0.05) 100px, rgba(255,255,255,0.05) 200px);
            transform: rotate(-15deg);
        }

        .card-glass {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        .score-input {
            width: 45px; height: 35px;
            background: #1e293b; color: #fbbf24;
            text-align: center; border-radius: 6px;
            font-family: 'Oswald', sans-serif; font-size: 1.1rem; font-weight: 700;
            border: none; outline: none;
            transition: all 0.2s;
        }
        .score-input:focus { 
            background: #334155;
            box-shadow: 0 0 0 2px var(--accent-yellow);
        }

        .player-tag { border-left: 4px solid transparent; transition: all 0.2s; }
        .player-tag.active { border-left-color: var(--viettel-red); background: white; }

        .glow-text { text-shadow: 0 0 20px rgba(255, 255, 255, 0.3); }
        
        @media (max-width: 768px) {
            .score-input { width: 38px; height: 32px; font-size: 1rem; }
        }
        
        .round-badge {
            background: #f87171;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
        }

        .rank-pos {
            font-size: 0.65rem;
            color: #94a3b8;
            font-weight: 800;
            margin-bottom: -2px;
        }
    </style>
</head>
<body class="py-6 px-4 md:px-8">

    <div class="max-w-[1400px] mx-auto relative z-10">
        
        <!-- Header Section -->
        <header class="dynamic-bg rounded-3xl shadow-2xl mb-12 p-8 md:p-12 text-center text-white">
            <div class="flex flex-col items-center mb-6">
                <div class="flex items-baseline space-x-2 bg-white/10 px-6 py-2 rounded-full backdrop-blur-md">
                    <span class="oswald font-black text-2xl tracking-tighter">VIETTEL</span>
                    <span class="oswald font-light text-2xl tracking-wide opacity-90">SOFTWARE</span>
                </div>
            </div>
            <h1 class="text-5xl md:text-8xl oswald font-black uppercase italic glow-text tracking-tighter">GIẢI CẦU LÔNG</h1>
            <div class="mt-4 bg-yellow-400 text-black px-4 py-1 font-black text-sm rounded shadow-lg inline-block">ĐÔI NAM 2026</div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- Rankings Sidebar -->
            <div class="lg:col-span-4 space-y-6">
                <section class="card-glass rounded-2xl overflow-hidden">
                    <div class="bg-red-600 p-4 text-white font-bold oswald text-xl uppercase italic flex justify-between items-center">
                        <span>Bảng Xếp Hạng A</span>
                    </div>
                    <div id="ranking-a" class="p-4 space-y-2"></div>
                </section>

                <section class="card-glass rounded-2xl overflow-hidden">
                    <div class="bg-slate-800 p-4 text-white font-bold oswald text-xl uppercase italic flex justify-between items-center">
                        <span>Bảng Xếp Hạng B</span>
                    </div>
                    <div id="ranking-b" class="p-4 space-y-2"></div>
                </section>
                
                <button onclick="resetData()" class="w-full py-3 bg-gray-200 hover:bg-red-500 hover:text-white text-gray-700 font-bold rounded-xl transition-all text-sm uppercase tracking-wider shadow-sm">
                    Xóa toàn bộ dữ liệu (Reset)
                </button>
            </div>

            <!-- Score Input & Finals -->
            <div class="lg:col-span-8 space-y-8">
                
                <!-- Group Stage Score Updates -->
                <div class="card-glass rounded-2xl overflow-hidden">
                    <div class="p-5 bg-white border-b flex justify-between items-center">
                        <div class="flex items-center space-x-2">
                            <h3 class="oswald text-2xl font-black text-red-600 uppercase italic">Lịch thi đấu & Kết quả</h3>
                        </div>
                    </div>
                    <div class="p-6 space-y-8" id="match-list-container">
                        <!-- Content generated by JS -->
                    </div>
                </div>

                <!-- Finals Bracket -->
                <div class="card-glass rounded-2xl p-6 bg-gradient-to-br from-white to-gray-50 border-t-4 border-red-600">
                    <h3 class="oswald text-2xl font-black text-gray-800 uppercase italic mb-8 border-b-2 border-red-600 inline-block">Vòng Chung Kết</h3>
                    
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <!-- Semi Finals -->
                        <div class="space-y-6">
                            <div class="bg-white p-4 rounded-xl shadow-md border-l-4 border-red-500">
                                <div class="text-[9px] font-black text-red-500 mb-2 uppercase">Bán Kết 1 (Nhất A - Nhì B)</div>
                                <div class="space-y-2">
                                    <div class="flex justify-between items-start py-1 border-b">
                                        <span id="sf1-team1-label" class="text-[10px] font-bold text-gray-400 italic break-words pr-2">...</span>
                                        <input type="number" id="sf1-s1" onchange="updateKnockoutScore('sf1-s1', this.value)" class="w-10 text-center bg-gray-100 rounded font-bold shrink-0" value="0">
                                    </div>
                                    <div class="flex justify-between items-start py-1">
                                        <span id="sf1-team2-label" class="text-[10px] font-bold text-gray-400 italic break-words pr-2">...</span>
                                        <input type="number" id="sf1-s2" onchange="updateKnockoutScore('sf1-s2', this.value)" class="w-10 text-center bg-gray-100 rounded font-bold shrink-0" value="0">
                                    </div>
                                </div>
                            </div>

                            <div class="bg-white p-4 rounded-xl shadow-md border-l-4 border-slate-700">
                                <div class="text-[9px] font-black text-slate-500 mb-2 uppercase">Bán Kết 2 (Nhất B - Nhì A)</div>
                                <div class="space-y-2">
                                    <div class="flex justify-between items-start py-1 border-b">
                                        <span id="sf2-team1-label" class="text-[10px] font-bold text-gray-400 italic break-words pr-2">...</span>
                                        <input type="number" id="sf2-s1" onchange="updateKnockoutScore('sf2-s1', this.value)" class="w-10 text-center bg-gray-100 rounded font-bold shrink-0" value="0">
                                    </div>
                                    <div class="flex justify-between items-start py-1">
                                        <span id="sf2-team2-label" class="text-[10px] font-bold text-gray-400 italic break-words pr-2">...</span>
                                        <input type="number" id="sf2-s2" onchange="updateKnockoutScore('sf2-s2', this.value)" class="w-10 text-center bg-gray-100 rounded font-bold shrink-0" value="0">
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Grand Final -->
                        <div class="flex flex-col justify-center">
                            <div class="bg-red-600 p-1 rounded-2xl shadow-xl">
                                <div class="bg-white rounded-xl p-4 text-center">
                                    <div class="oswald text-red-600 text-2xl font-black mb-1 italic">CHUNG KẾT</div>
                                    <div class="my-4 space-y-3">
                                        <div class="text-[9px] font-black uppercase text-gray-800 leading-tight min-h-[20px] break-words" id="final-t1">Thắng BK1</div>
                                        <div class="flex items-center justify-center space-x-2">
                                            <input type="number" id="f-s1" onchange="updateKnockoutScore('f-s1', this.value)" class="w-10 h-10 bg-slate-800 text-yellow-400 text-center font-bold rounded text-lg" value="0">
                                            <span class="text-red-600 font-black">-</span>
                                            <input type="number" id="f-s2" onchange="updateKnockoutScore('f-s2', this.value)" class="w-10 h-10 bg-slate-800 text-yellow-400 text-center font-bold rounded text-lg" value="0">
                                        </div>
                                        <div class="text-[9px] font-black uppercase text-gray-800 leading-tight min-h-[20px] break-words" id="final-t2">Thắng BK2</div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Bronze -->
                        <div class="flex flex-col justify-center">
                            <div class="bg-yellow-400 p-4 rounded-xl shadow-md border border-yellow-500/30">
                                <div class="text-[10px] font-black text-black/60 uppercase text-center mb-2">Tranh Hạng 3</div>
                                <div class="space-y-4">
                                    <div class="text-center">
                                        <div id="bronze-t1" class="text-[9px] font-black uppercase mb-1 break-words">Thua BK1</div>
                                        <input type="number" id="b-s1" onchange="updateKnockoutScore('b-s1', this.value)" class="w-8 h-6 bg-white/50 text-center rounded text-xs font-bold" value="0">
                                    </div>
                                    <div class="text-center">
                                        <div id="bronze-t2" class="text-[9px] font-black uppercase mb-1 break-words">Thua BK2</div>
                                        <input type="number" id="b-s2" onchange="updateKnockoutScore('b-s2', this.value)" class="w-8 h-6 bg-white/50 text-center rounded text-xs font-bold" value="0">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        const TEAMS_A = [
            { id: 'A1', name: 'Tạ Hữu Anh – Nguyễn Nhật Quang' },
            { id: 'A2', name: 'Nguyễn Văn Huy – Vũ Quang Hưng' },
            { id: 'A3', name: 'Đinh Anh Tuân – Nguyễn Cao Kỳ' },
            { id: 'A4', name: 'Nguyễn Bá Ngọc – Nguyễn Xuân Trường' },
            { id: 'A5', name: 'Nguyễn Xuân Phú – Nguyễn Đức Thắng' }
        ];

        const TEAMS_B = [
            { id: 'B1', name: 'Hà Thanh Lâm – Phạm Đức Duy' },
            { id: 'B2', name: 'Nguyễn Đức Trí – Nguyễn Thanh Thiên' },
            { id: 'B3', name: 'Phùng Đình Tuấn – Vũ Văn Trung' },
            { id: 'B4', name: 'Đàm Tuấn Khang – Tô Duy Tường' },
            { id: 'B5', name: 'Nguyễn Mạnh Hùng – Dư Văn An' }
        ];

        // Lịch thi đấu theo Round
        const SCHEDULE = [
            { round: 1, matches: [{s:1, t1:'A1', t2:'A2'}, {s:2, t1:'B1', t2:'B2'}, {s:3, t1:'A3', t2:'A4'}] },
            { round: 2, matches: [{s:1, t1:'B3', t2:'B4'}, {s:2, t1:'A1', t2:'A3'}, {s:3, t1:'B1', t2:'B3'}] },
            { round: 3, matches: [{s:1, t1:'A2', t2:'A5'}, {s:2, t1:'B2', t2:'B5'}, {s:3, t1:'A4', t2:'A5'}] },
            { round: 4, matches: [{s:1, t1:'B1', t2:'B4'}, {s:2, t1:'A1', t2:'A4'}, {s:3, t1:'B3', t2:'B5'}] },
            { round: 5, matches: [{s:1, t1:'A2', t2:'A3'}, {s:2, t1:'B2', t2:'B3'}, {s:3, t1:'A3', t2:'A5'}] },
            { round: 6, matches: [{s:1, t1:'B1', t2:'B5'}, {s:2, t1:'A1', t2:'A5'}, {s:3, t1:'B2', t2:'B4'}] },
            { round: 7, matches: [{s:1, t1:'A2', t2:'A4'}, {s:2, t1:'B4', t2:'B5'}] }
        ];

        let fixtures = [];
        SCHEDULE.forEach(r => {
            r.matches.forEach(m => {
                fixtures.push({ ...m, round: r.round, s1: 0, s2: 0 });
            });
        });

        let knockoutScores = {
            'sf1-s1': 0, 'sf1-s2': 0, 'sf2-s1': 0, 'sf2-s2': 0,
            'f-s1': 0, 'f-s2': 0, 'b-s1': 0, 'b-s2': 0
        };

        let currentSF1 = { t1: null, t2: null };
        let currentSF2 = { t1: null, t2: null };

        function saveData() {
            localStorage.setItem('badminton_fixtures_2026_final_v6', JSON.stringify(fixtures));
            localStorage.setItem('badminton_knockout_2026_final_v6', JSON.stringify(knockoutScores));
        }

        function loadData() {
            const savedFixtures = localStorage.getItem('badminton_fixtures_2026_final_v6');
            const savedKnockout = localStorage.getItem('badminton_knockout_2026_final_v6');
            if (savedFixtures) fixtures = JSON.parse(savedFixtures);
            if (savedKnockout) {
                knockoutScores = JSON.parse(savedKnockout);
                Object.keys(knockoutScores).forEach(id => {
                    const el = document.getElementById(id);
                    if (el) el.value = knockoutScores[id];
                });
            }
        }

        function resetData() {
            if(confirm("Xóa toàn bộ điểm số để bắt đầu lại?")) {
                localStorage.removeItem('badminton_fixtures_2026_final_v6');
                localStorage.removeItem('badminton_knockout_2026_final_v6');
                location.reload();
            }
        }

        function renderMatches() {
            const container = document.getElementById('match-list-container');
            container.innerHTML = '';

            for (let r = 1; r <= 7; r++) {
                const roundMatches = fixtures.filter(m => m.round === r);
                if (roundMatches.length === 0) continue;

                const roundDiv = document.createElement('div');
                roundDiv.innerHTML = `
                    <div class="flex items-center space-x-3 mb-4">
                        <span class="round-badge italic tracking-tighter">Vòng ${r}</span>
                        <div class="h-px bg-gray-200 flex-1"></div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4 mb-8">
                        ${roundMatches.map((m) => {
                            const globalIdx = fixtures.findIndex(f => f.t1 === m.t1 && f.t2 === m.t2);
                            return `
                                <div class="bg-white p-3 rounded-xl border border-gray-100 shadow-sm hover:border-red-200 transition-colors">
                                    <div class="text-[8px] font-black text-gray-400 mb-2 uppercase">Sân ${m.s}</div>
                                    <div class="flex items-center justify-between">
                                        <span class="oswald font-black text-sm w-8 text-red-600 text-center shrink-0">${m.t1}</span>
                                        <div class="flex items-center space-x-2">
                                            <input type="number" value="${m.s1}" onchange="updateScore(${globalIdx}, 1, this.value)" class="score-input">
                                            <span class="text-gray-300 font-bold">:</span>
                                            <input type="number" value="${m.s2}" onchange="updateScore(${globalIdx}, 2, this.value)" class="score-input">
                                        </div>
                                        <span class="oswald font-black text-sm w-8 text-slate-700 text-center shrink-0">${m.t2}</span>
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                `;
                container.appendChild(roundDiv);
            }
        }

        function updateScore(index, teamPos, val) {
            const value = parseInt(val) || 0;
            if (teamPos === 1) fixtures[index].s1 = value;
            else fixtures[index].s2 = value;
            saveData();
            calculateRankings();
        }

        function updateKnockoutScore(id, val) {
            knockoutScores[id] = parseInt(val) || 0;
            saveData();
            updateFinalsFromScores();
        }

        function calculateRankings() {
            const stats = {};
            [...TEAMS_A, ...TEAMS_B].forEach(t => {
                stats[t.id] = { ...t, wins: 0, diff: 0, played: 0 };
            });

            fixtures.forEach(m => {
                if (m.s1 !== 0 || m.s2 !== 0) {
                    stats[m.t1].played++;
                    stats[m.t2].played++;
                    if (m.s1 > m.s2) stats[m.t1].wins++;
                    else if (m.s2 > m.s1) stats[m.t2].wins++;
                    
                    const diff = m.s1 - m.s2;
                    stats[m.t1].diff += diff;
                    stats[m.t2].diff -= diff;
                }
            });

            const sortFn = (a, b) => b.wins !== a.wins ? b.wins - a.wins : b.diff - a.diff;
            const rankA = TEAMS_A.map(t => stats[t.id]).sort(sortFn);
            const rankB = TEAMS_B.map(t => stats[t.id]).sort(sortFn);

            displayRankings('ranking-a', rankA);
            displayRankings('ranking-b', rankB);
            updateFinalsBracket(rankA, rankB);
        }

        function displayRankings(elId, ranks) {
            const container = document.getElementById(elId);
            container.innerHTML = ranks.map((team, i) => `
                <div class="player-tag p-3 rounded-xl ${i < 2 ? 'bg-white active shadow-md' : 'bg-gray-50 opacity-80'}">
                    <div class="flex items-start">
                        <div class="flex flex-col items-center mr-3 w-8 shrink-0">
                            <span class="rank-pos">#${i+1}</span>
                            <span class="oswald font-black text-sm ${i < 2 ? 'text-red-600' : 'text-gray-400'}">${team.id}</span>
                        </div>
                        <div class="flex-1 border-l pl-3 border-gray-100 min-w-0">
                            <div class="text-[11px] font-extrabold text-gray-800 leading-tight uppercase mb-1 break-words">${team.name}</div>
                            <div class="flex space-x-3">
                                <div class="text-[9px] font-bold">
                                    <span class="text-gray-400 uppercase">Thắng:</span> 
                                    <span class="text-blue-600 font-black ml-0.5">${team.wins}</span>
                                </div>
                                <div class="text-[9px] font-bold">
                                    <span class="text-gray-400 uppercase">Hiệu số:</span> 
                                    <span class="${team.diff >= 0 ? 'text-green-600' : 'text-red-500'} font-black ml-0.5">${team.diff > 0 ? '+' + team.diff : team.diff}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function updateFinalsBracket(rankA, rankB) {
            const hasStartedA = rankA.some(t => t.played > 0);
            const hasStartedB = rankB.some(t => t.played > 0);

            currentSF1 = { t1: hasStartedA ? rankA[0] : null, t2: hasStartedB ? rankB[1] : null };
            currentSF2 = { t1: hasStartedB ? rankB[0] : null, t2: hasStartedA ? rankA[1] : null };

            setLabelText('sf1-team1-label', currentSF1.t1, 'Nhất Bảng A');
            setLabelText('sf1-team2-label', currentSF1.t2, 'Nhì Bảng B');
            setLabelText('sf2-team1-label', currentSF2.t1, 'Nhất Bảng B');
            setLabelText('sf2-team2-label', currentSF2.t2, 'Nhì Bảng A');

            updateFinalsFromScores();
        }

        function setLabelText(id, team, def) {
            const el = document.getElementById(id);
            if (team && team.played > 0) {
                el.innerText = team.name;
                el.classList.remove('text-gray-400', 'italic');
                el.classList.add('text-gray-900', 'font-black');
            } else {
                el.innerText = def;
                el.classList.add('text-gray-400', 'italic');
                el.classList.remove('text-gray-900', 'font-black');
            }
        }

        function updateFinalsFromScores() {
            const s1_1 = knockoutScores['sf1-s1'], s1_2 = knockoutScores['sf1-s2'];
            const s2_1 = knockoutScores['sf2-s1'], s2_2 = knockoutScores['sf2-s2'];

            if ((s1_1 || s1_2) && currentSF1.t1 && currentSF1.t2) {
                const winner = s1_1 > s1_2 ? currentSF1.t1 : currentSF1.t2;
                const loser = s1_1 > s1_2 ? currentSF1.t2 : currentSF1.t1;
                document.getElementById('final-t1').innerText = winner.name;
                document.getElementById('bronze-t1').innerText = loser.name;
            }
            if ((s2_1 || s2_2) && currentSF2.t1 && currentSF2.t2) {
                const winner = s2_1 > s2_2 ? currentSF2.t1 : currentSF2.t2;
                const loser = s2_1 > s2_2 ? currentSF2.t2 : currentSF2.t1;
                document.getElementById('final-t2').innerText = winner.name;
                document.getElementById('bronze-t2').innerText = loser.name;
            }
        }

        window.onload = () => {
            loadData();
            renderMatches();
            calculateRankings();
        };
    </script>
</body>
</html>
